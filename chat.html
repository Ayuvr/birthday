<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat ❤️
        <p style="font-size:.9rem;color:#7a1f4d;">
    Only for Akshit ❤️ Swasty
</p>
    </title>

    <link rel="stylesheet" href="chat.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <button class="back-btn" id="backBtn">
    ←
</button>

    <div class="chat-background">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

    <!-- NAME SCREEN -->

    <div id="nameScreen" class="name-screen">

        <div class="name-card">

            <h1>💬 Private Chat Room</h1>

            <p>
                Enter your name to join the conversation ❤️
            </p>

            <input
                type="text"
                id="username"
                placeholder="Your Name">

            <button id="joinBtn">
                Join Chat
            </button>

        </div>

    </div>

    <!-- CHAT APP -->

    <div id="chatApp" class="chat-app">

        <div class="chat-header">

            <h2>❤️ Private Chat ❤️</h2>

        </div>

        <div id="messages" class="messages"></div>

        <div class="chat-input">

            <input
                type="text"
                id="messageInput"
                placeholder="Type a message...">

            <button id="sendBtn">
                Send ❤️
            </button>

        </div>

    </div>

    <script type="module" src="chat.js"></script>

</body>
</html>
